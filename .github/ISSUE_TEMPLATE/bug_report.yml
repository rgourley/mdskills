name: Bug Report
description: Report a bug or something not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Page URL
      description: The URL where you encountered the bug (if applicable)
      placeholder: https://www.mdskills.ai/...

  - type: dropdown
    id: locale
    attributes:
      label: Language
      description: Which language were you using?
      options:
        - English
        - Chinese (中文)
        - French (Français)
        - German (Deutsch)
        - Korean (한국어)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, browser/OS info, etc.
