name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why would it be useful?
      placeholder: I'd like to see...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the project does this relate to?
      options:
        - Website UI
        - CLI (npx mdskills)
        - Translations / i18n
        - SEO
        - New skill type or category
        - Documentation
        - API
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, links to similar features elsewhere, etc.
